substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: sportlife-web
  _ARTIFACT_REPO: sportlife
  _IMAGE_NAME: sportlife-web
  _CLOUD_SQL_INSTANCE: sportlife-postgres
  _GCS_BUCKET: sportlife-uploads-sport-life-497407
  _NEXTAUTH_URL: https://sportlife.io.vn
  _APP_BASE_URL: https://sportlife.io.vn
  _EMAIL_FROM: SportLife <sonthedayne@gmail.com>
  _SMTP_HOST: smtp.gmail.com
  _SMTP_PORT: "465"
  _SMTP_SECURE: "true"
  _SMTP_USER: sonthedayne@gmail.com
  _SMS_PROVIDER: unimtx
  _UNIMTX_ACCESS_KEY_ID: SkcEyh2hfSzEsM8pJDtvqM

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install
    name: node:22
    dir: frontend
    entrypoint: npm
    args: ["ci"]

  - id: prisma-generate
    name: node:22
    dir: frontend
    entrypoint: npm
    env:
      - DATABASE_URL=postgresql://sportlife:sportlife@localhost:5432/sportlife?schema=public
    args: ["run", "prisma:generate"]

  - id: typecheck
    name: node:22
    dir: frontend
    entrypoint: npm
    env:
      - DATABASE_URL=postgresql://sportlife:sportlife@localhost:5432/sportlife?schema=public
    args: ["run", "typecheck"]

  - id: lint
    name: node:22
    dir: frontend
    entrypoint: npm
    env:
      - DATABASE_URL=postgresql://sportlife:sportlife@localhost:5432/sportlife?schema=public
    args: ["run", "lint"]

  - id: test
    name: node:22
    dir: frontend
    entrypoint: npm
    env:
      - DATABASE_URL=postgresql://sportlife:sportlife@localhost:5432/sportlife?schema=public
    args: ["run", "test"]

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "frontend/Dockerfile.prod",
        "--build-arg",
        "DATABASE_URL=postgresql://sportlife:sportlife@localhost:5432/sportlife?schema=public",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${BUILD_ID}",
        "frontend",
      ]

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${BUILD_ID}",
      ]

  # Enable this step after Prisma migrations are committed and DATABASE_URL exists in Secret Manager.
  # - id: migrate
  #   name: node:22
  #   dir: frontend
  #   entrypoint: bash
  #   secretEnv: ["DATABASE_URL"]
  #   args:
  #     - -lc
  #     - |
  #       npm ci
  #       npx prisma generate
  #       npx prisma migrate deploy

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE_NAME}",
        "--image",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${BUILD_ID}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--add-cloudsql-instances",
        "${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}",
        "--min-instances",
        "0",
        "--max-instances",
        "2",
        "--port",
        "8080",
        "--set-env-vars",
        "NEXTAUTH_URL=${_NEXTAUTH_URL},APP_BASE_URL=${_APP_BASE_URL},AUTH_TRUST_HOST=true,EMAIL_PROVIDER=smtp,EMAIL_FROM=${_EMAIL_FROM},SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_SECURE=${_SMTP_SECURE},SMTP_USER=${_SMTP_USER},STORAGE_PROVIDER=gcs,GCS_BUCKET=${_GCS_BUCKET},NODE_ENV=production,SMS_PROVIDER=${_SMS_PROVIDER},UNIMTX_ACCESS_KEY_ID=${_UNIMTX_ACCESS_KEY_ID}",
        "--set-secrets",
        "DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,SMTP_APP_PASSWORD=SMTP_APP_PASSWORD:latest",
      ]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${BUILD_ID}"

# Uncomment when the migrate step is enabled.
# availableSecrets:
#   secretManager:
#     - versionName: projects/${PROJECT_ID}/secrets/DATABASE_URL/versions/latest
#       env: DATABASE_URL
