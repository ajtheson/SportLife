options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install
    name: node:22
    dir: frontend
    entrypoint: npm
    args: ["ci"]

  - id: seed
    name: node:22
    dir: frontend
    entrypoint: bash
    secretEnv: ["DATABASE_URL", "SMTP_APP_PASSWORD"]
    env:
      - ADMIN_SEED_EMAIL=admin@sportlife.local
      - ADMIN_SEED_PASSWORD=ChangeMe123!
      - EMAIL_PROVIDER=smtp
      - EMAIL_FROM=SportLife <thesondayne@gmail.com>
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=thesondayne@gmail.com
      - STORAGE_PROVIDER=gcs
      - GCS_BUCKET=sportlife-uploads-sport-life-497407
    args:
      - -lc
      - |
        apt-get update
        apt-get install -y curl ca-certificates
        curl -fsSL -o /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.20.0/cloud-sql-proxy.linux.amd64
        chmod +x /tmp/cloud-sql-proxy
        mkdir -p /cloudsql
        /tmp/cloud-sql-proxy --unix-socket /cloudsql sport-life-497407:asia-southeast1:sportlife-postgres &
        sleep 5
        npm run prisma:generate
        npm run db:seed

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL
    - versionName: projects/${PROJECT_ID}/secrets/SMTP_APP_PASSWORD/versions/latest
      env: SMTP_APP_PASSWORD
